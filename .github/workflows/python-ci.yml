name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    working-directory: ./pyfru
    
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
      - run: ruff format --check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - name: Install packages
        run: pip install maturin pytest pandas
      - name: Build wheel
        run: maturin --release --out dist
      - name: Install package
        run: pip install pyfru --find-links dist
      - name: pytest
        run: pytest

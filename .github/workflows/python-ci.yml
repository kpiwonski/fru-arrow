name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
      - run: ruff format --check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - name: Setup venv
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
      - name: Install package
        uses: PyO3/maturin-action@v1
        with:
          command: develop
      - name: pytest
        run: pytest
        

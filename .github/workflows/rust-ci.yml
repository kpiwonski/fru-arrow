name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
    - name: Format check
      run: cargo fmt -- --check
    - name: Lint (Clippy)
      run: cargo clippy --all-targets --all-features -- -D warnings   
    - name: Run tests
      run: cargo test --all-features
